name: Deploy to Hestia

on:
  push:
    branches: [ main ]
    paths:
      - 'admin_management_api.php'
      - 'vehicle_stats_api.php'
      - 'sticker_management_api.php'
      - 'superadmin.php'
      - 'vehicle_list_drill_down.php'
      - 'database/migration_admin_features.sql'
      - '.github/workflows/deploy-to-hestia.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy via SSH (if SSH key available)
      if: secrets.HESTIA_SSH_KEY != null && secrets.HESTIA_HOST != null && secrets.HESTIA_USER != null
      run: |
        # Setup SSH key
        mkdir -p ~/.ssh
        echo "${{ secrets.HESTIA_SSH_KEY }}" > ~/.ssh/deploy_key
        chmod 600 ~/.ssh/deploy_key
        ssh-keyscan -H ${{ secrets.HESTIA_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
        
        # Create SSH config
        cat > ~/.ssh/config << 'EOF'
        Host hestia
          HostName ${{ secrets.HESTIA_HOST }}
          User ${{ secrets.HESTIA_USER }}
          IdentityFile ~/.ssh/deploy_key
          StrictHostKeyChecking accept-new
        EOF
        chmod 600 ~/.ssh/config
        
        # Upload files via SCP
        scp -i ~/.ssh/deploy_key \
          admin_management_api.php \
          vehicle_stats_api.php \
          sticker_management_api.php \
          superadmin.php \
          vehicle_list_drill_down.php \
          ${{ secrets.HESTIA_USER }}@${{ secrets.HESTIA_HOST }}:~/public_html/
        
        # Set permissions via SSH
        ssh -i ~/.ssh/deploy_key ${{ secrets.HESTIA_USER }}@${{ secrets.HESTIA_HOST }} \
          "chmod 644 ~/public_html/{admin_management_api,vehicle_stats_api,sticker_management_api,superadmin,vehicle_list_drill_down}.php"
        
        echo "✓ Files deployed via SSH"
    
    - name: Deployment notice
      if: secrets.HESTIA_SSH_KEY == null || secrets.HESTIA_HOST == null || secrets.HESTIA_USER == null
      run: |
        echo "⚠️  SSH Key not configured in GitHub Secrets"
        echo "To enable automatic deployment, add these secrets:"
        echo "  - HESTIA_SSH_KEY (private key content)"
        echo "  - HESTIA_HOST (neovtrack.uitm.edu.my)"
        echo "  - HESTIA_USER (your SSH username)"
        echo ""
        echo "Setup instructions:"
        echo "1. Generate SSH key: ssh-keygen -t rsa -b 4096 -f hestia_deploy_key -N ''"
        echo "2. Copy private key to HESTIA_SSH_KEY secret"
        echo "3. Add public key to ~/.ssh/authorized_keys on Hestia"
        exit 0
    
    - name: Notify deployment
      if: success()
      run: |
        echo "✓ Deployment completed successfully"
        echo "Access deployed files at: https://${{ secrets.HESTIA_HOST }}/[filename]"
