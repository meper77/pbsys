name: Deploy to Hestia

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/workflows/build-apk.yml'
      - 'pbsystem_app/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    # Self-hosted runner on UiTM intranet (cloud runners can't reach 10.0.26.208).
    runs-on: [self-hosted, Windows, hestia-lan]
    defaults:
      run:
        shell: 'powershell -ExecutionPolicy Bypass -NoProfile -File "{0}"'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show runner / tools
        run: |
          Write-Host "Runner: $env:RUNNER_NAME on $env:RUNNER_OS"
          rclone --version | Select-Object -First 1
          ssh -V

      - name: Probe SFTP connectivity
        run: |
          rclone lsd hestia: --sftp-disable-hashcheck | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "SFTP probe failed" }
          Write-Host "SFTP reachable"

      - name: Sync to Hestia (rclone SFTP)
        run: |
          $remote = "hestia:web/neovtrack.uitm.edu.my/public_html"
          Write-Host "Syncing repo -> $remote"
          rclone sync ./ $remote `
            --sftp-disable-hashcheck `
            --transfers 8 `
            --checkers 8 `
            --stats=10s --stats-one-line `
            --exclude '.git/**' `
            --exclude '.github/**' `
            --exclude '.claude/**' `
            --exclude '.gitignore' `
            --exclude 'pbsystem_app/**' `
            --exclude '*.md' `
            --exclude '*.txt' `
            --exclude '*.zip' `
            --exclude '*.ps1' `
            --exclude '*.sh' `
            --exclude '*.cmd' `
            --exclude 'debug.log' `
            --exclude 'Username*' `
            --exclude 'test_*.php' `
            --exclude 'test.php' `
            --exclude 'deploy_package/**' `
            --exclude 'runner-setup/**'
          if ($LASTEXITCODE -ne 0) { throw "rclone sync failed ($LASTEXITCODE)" }

      - name: Summary
        if: success()
        run: |
          $sha = $env:GITHUB_SHA.Substring(0,7)
          Write-Host "Deployed commit $sha"
          Write-Host "Live at https://neovtrack.uitm.edu.my/"
