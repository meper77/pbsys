name: Deploy to Hestia

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/workflows/build-apk.yml'
      - 'pbsystem_app/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    # Self-hosted runner on UiTM intranet (cloud runners can't reach 10.0.26.208).
    runs-on: [self-hosted, Windows, hestia-lan]
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show runner / tools
        run: |
          echo "Runner: $RUNNER_NAME on $RUNNER_OS"
          rclone --version | head -1
          ssh -V

      - name: Probe SFTP connectivity
        run: |
          rclone lsd hestia: --sftp-disable-hashcheck >/dev/null
          echo "✓ SFTP reachable"

      - name: Sync to Hestia (rclone SFTP)
        run: |
          REMOTE="hestia:web/neovtrack.uitm.edu.my/public_html"
          echo "Syncing repo -> $REMOTE"
          rclone sync ./ "$REMOTE" \
            --sftp-disable-hashcheck \
            --transfers 8 \
            --checkers 8 \
            --stats=10s --stats-one-line \
            --exclude '.git/**' \
            --exclude '.github/**' \
            --exclude '.claude/**' \
            --exclude '.gitignore' \
            --exclude 'pbsystem_app/**' \
            --exclude '*.md' \
            --exclude '*.txt' \
            --exclude '*.zip' \
            --exclude '*.ps1' \
            --exclude '*.sh' \
            --exclude '*.cmd' \
            --exclude 'debug.log' \
            --exclude 'Username*' \
            --exclude 'test_*.php' \
            --exclude 'test.php' \
            --exclude 'deploy_package/**' \
            --exclude 'runner-setup/**'

      - name: Summary
        if: success()
        run: |
          echo "✓ Deployed commit ${GITHUB_SHA::7}"
          echo "✓ Live at https://neovtrack.uitm.edu.my/"
