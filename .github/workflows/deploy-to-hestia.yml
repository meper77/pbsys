name: Deploy to Hestia

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/workflows/build-apk.yml'
      - 'pbsystem_app/**'
      - '.gitignore'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HESTIA_HOST: ${{ secrets.HESTIA_HOST }}
      HESTIA_USER: ${{ secrets.HESTIA_USER }}
      HESTIA_SSH_KEY: ${{ secrets.HESTIA_SSH_KEY }}
      HESTIA_PATH: ${{ secrets.HESTIA_PATH }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Guard — required secrets configured
        run: |
          missing=0
          for v in HESTIA_HOST HESTIA_USER HESTIA_SSH_KEY; do
            if [ -z "${!v}" ]; then
              echo "::error::Missing secret: $v"
              missing=1
            fi
          done
          if [ $missing -eq 1 ]; then
            echo "Configure secrets at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          echo "All required secrets present."

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$HESTIA_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$HESTIA_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via lftp (SFTP mirror)
        run: |
          REMOTE_PATH="${HESTIA_PATH:-web/neovtrack.uitm.edu.my/public_html}"
          echo "Mirroring to sftp://${HESTIA_USER}@${HESTIA_HOST}/${REMOTE_PATH}"
          lftp -c "
            set sftp:connect-program 'ssh -a -x -i $HOME/.ssh/deploy_key -o StrictHostKeyChecking=accept-new';
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            set net:timeout 30;
            open -u ${HESTIA_USER}, sftp://${HESTIA_HOST};
            mirror -R --delete --verbose --parallel=4 \
              --exclude-glob .git/ \
              --exclude-glob .github/ \
              --exclude-glob .claude/ \
              --exclude-glob .gitignore \
              --exclude-glob pbsystem_app/ \
              --exclude-glob '*.md' \
              --exclude-glob '*.txt' \
              --exclude-glob '*.zip' \
              --exclude-glob '*.ps1' \
              --exclude-glob '*.sh' \
              --exclude-glob '*.cmd' \
              --exclude-glob debug.log \
              --exclude-glob 'Username*' \
              --exclude-glob 'test_*.php' \
              --exclude-glob test.php \
              --exclude-glob deploy_package/ \
              ./ ${REMOTE_PATH}/;
            bye
          "

      - name: Deployment summary
        if: success()
        run: |
          echo "✓ Deployed commit ${{ github.sha }}"
          echo "✓ Live at https://${HESTIA_HOST}/"
